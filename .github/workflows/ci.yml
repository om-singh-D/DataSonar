name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Ingestion Service
  # ============================================
  ingestion-service:
    name: 🔌 Ingestion Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/ingestion/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ============================================
  # Docker Build Validation
  # ============================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [ingestion-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Ingestion Service Image
        run: docker build -t datasonar/ingestion:test services/ingestion


  # ============================================
  # Gateway Service
  # ============================================
  gateway-service:
    name: 🔐 Gateway Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build